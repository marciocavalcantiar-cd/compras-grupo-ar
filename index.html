<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras AR — Pedidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ar-black:#18181A;--ar-black-2:#232325;--ar-black-3:#2E2E31;
      --ar-accent:#EF9F27;--ar-accent-dim:#FAC775;--ar-ton:#412402;
      --ar-white:#F5F4F0;--ar-dim:#A8A7A3;
      --ar-faint:rgba(245,244,240,0.07);--ar-faint2:rgba(245,244,240,0.13);
      --ar-border:rgba(245,244,240,0.10);--ar-border2:rgba(245,244,240,0.18);
      --ar-green:#5DCAA5;--ar-green-bg:rgba(29,158,117,0.18);
      --ar-blue:#7BC8F6;--ar-blue-bg:rgba(123,200,246,0.18);
      --ar-warn-bg:rgba(239,159,39,0.18);
      --ar-red:#F09595;--ar-red-bg:rgba(226,75,74,0.18);
      --ar-purple:#D98CF5;--ar-purple-bg:rgba(217,140,245,0.18);
      --r:10px;--rl:14px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--ar-black-2);color:var(--ar-white);min-height:100vh;padding:1.5rem 2.5rem}
    .app{max-width:1400px;margin:0 auto}
    .header{background:var(--ar-black);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
    .logo-mark{width:42px;height:42px;background:#fff;border-radius:8px;border:2px solid var(--ar-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px}
    .h-title{font-size:16px;font-weight:500;color:var(--ar-white)}
    .h-sub{font-size:12px;color:var(--ar-dim);margin-top:1px;display:flex;align-items:center;gap:5px}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ar-green);display:inline-block;flex-shrink:0}
    .btn-new{background:var(--ar-accent);color:var(--ar-ton);border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity 0.15s}
    .btn-new:hover{opacity:0.88}
    .tabs-wrap{display:flex;gap:2px;margin-bottom:1rem;background:var(--ar-black);border-radius:var(--r);padding:4px}
    .tab{flex:1;padding:8px 4px;font-size:13px;background:transparent;border:none;border-radius:7px;cursor:pointer;color:var(--ar-dim);font-family:inherit;transition:all 0.15s;text-align:center}
    .tab.active{background:var(--ar-accent);color:var(--ar-ton);font-weight:500}
    .tab:hover:not(.active){color:var(--ar-white);background:var(--ar-faint)}
    .page{display:none}.page.active{display:block}
    .card{background:var(--ar-black);border:0.5px solid var(--ar-border);border-radius:var(--rl);padding:1.25rem;margin-bottom:10px}
    .slbl{font-size:11px;font-weight:500;color:var(--ar-dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
    .badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;white-space:nowrap}
    .s-aguardando{background:var(--ar-faint2);color:var(--ar-dim)}
    .s-pedido{background:var(--ar-warn-bg);color:var(--ar-accent-dim)}
    .s-transito{background:var(--ar-blue-bg);color:var(--ar-blue)}
    .s-recebido{background:var(--ar-green-bg);color:var(--ar-green)}
    .btn{font-family:inherit;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer;border:0.5px solid var(--ar-border2);background:transparent;color:var(--ar-white);transition:background 0.12s;display:inline-flex;align-items:center;gap:5px}
    .btn:hover{background:var(--ar-faint2)}
    .btn-acc{background:var(--ar-accent);color:var(--ar-ton);border:none;font-weight:500}
    .btn-acc:hover{opacity:0.88;background:var(--ar-accent)}
    .btn-sm{font-size:12px;padding:5px 10px}
    .btn-del{color:var(--ar-red);border-color:transparent}
    .btn-del:hover{background:var(--ar-red-bg)}
    .fb{display:flex;justify-content:space-between;align-items:center}
    .g8{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sep{border:none;border-top:0.5px solid var(--ar-border);margin:12px 0}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;font-size:11px;font-weight:500;color:var(--ar-dim);padding:6px 8px;border-bottom:0.5px solid var(--ar-border)}
    td{padding:8px 8px;border-bottom:0.5px solid var(--ar-border);color:var(--ar-white);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .empty{text-align:center;padding:3rem 1rem;color:var(--ar-dim);font-size:14px}
    .empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.25}
    input,select{font-family:inherit;font-size:14px;background:var(--ar-black-3);border:0.5px solid var(--ar-border2);border-radius:8px;color:var(--ar-white);padding:8px 12px}
    input::placeholder{color:var(--ar-dim)}
    input:focus,select:focus{outline:none;border-color:var(--ar-accent)}
    select option{background:var(--ar-black-2);color:var(--ar-white)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:500;color:var(--ar-dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px}
    .field input,.field select{width:100%}
    .grid2f{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3f{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .prod-list{max-height:260px;overflow-y:auto}
    .prod-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--ar-border);font-size:13px;color:var(--ar-white)}
    .prod-row:last-child{border-bottom:none}
    .prod-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--ar-accent);cursor:pointer}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:50;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto}
    .overlay.open{display:flex}
    .mbox{background:var(--ar-black-2);border:0.5px solid var(--ar-border2);border-radius:var(--rl);padding:1.5rem;width:620px;max-width:96%;margin-bottom:30px}
    .loading{text-align:center;padding:2rem;color:var(--ar-dim);font-size:14px}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--ar-black-3);border:0.5px solid var(--ar-border2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--ar-white);z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none}
    .toast.show{opacity:1}
    /* Restaurante tabs */
    .rest-tabs{display:flex;gap:6px;margin-bottom:1rem}
    .rest-tab{padding:7px 18px;font-size:13px;border-radius:8px;cursor:pointer;border:0.5px solid var(--ar-border2);background:transparent;color:var(--ar-dim);font-family:inherit;transition:all 0.15s}
    .rest-tab.active{background:var(--ar-accent);color:var(--ar-ton);border-color:transparent;font-weight:500}
    .rest-tab:hover:not(.active){color:var(--ar-white);background:var(--ar-faint)}
    /* Stats grid */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .stat{background:var(--ar-black-2);border-radius:10px;padding:12px 14px;border:0.5px solid var(--ar-border)}
    .stat-l{font-size:11px;color:var(--ar-dim);margin-bottom:4px}
    .stat-v{font-size:20px;font-weight:500;color:var(--ar-white)}
    .stat-sub{font-size:11px;color:var(--ar-dim);margin-top:2px}
    /* Pedido card */
    .pedido-card{background:var(--ar-black);border:0.5px solid var(--ar-border);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
    .pedido-card:hover{border-color:var(--ar-border2)}
    /* Status select inline */
    .status-sel{font-size:12px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--ar-border2);background:var(--ar-black-3);color:var(--ar-white);cursor:pointer;font-family:inherit}
    /* Item row na tabela */
    .item-status-sel{font-size:12px;padding:3px 6px;border-radius:6px;border:0.5px solid var(--ar-border2);background:var(--ar-black-3);color:var(--ar-white);cursor:pointer;font-family:inherit}
    /* Dashboard */
    .rest-summary{background:var(--ar-black);border:0.5px solid var(--ar-border);border-radius:var(--rl);padding:1.25rem;margin-bottom:10px}
    .rest-summary-title{font-size:15px;font-weight:500;color:var(--ar-white);margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .progress-bar{height:6px;background:var(--ar-black-3);border-radius:3px;overflow:hidden;margin-top:6px}
    .progress-fill{height:100%;background:var(--ar-accent);border-radius:3px;transition:width 0.3s}

    .semana-card{background:var(--ar-black);border:0.5px solid var(--ar-border);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
    .semana-head{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer}
    .semana-head:hover{background:var(--ar-faint)}
    .semana-body{padding:0 1.25rem 1.25rem}
    .semana-collapsed .semana-body{display:none}
    .toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .sort-btn{font-size:12px;padding:4px 11px;border-radius:8px;border:0.5px solid var(--ar-border2);background:transparent;color:var(--ar-dim);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all 0.12s}
    .sort-btn:hover{color:var(--ar-white);background:var(--ar-faint2)}
    .sort-btn.active{background:var(--ar-accent);color:var(--ar-ton);border-color:transparent;font-weight:500}
    .tbl-outer{border:0.5px solid var(--ar-border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
    .ped-table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
    .ped-table thead tr{background:var(--ar-black-3)}
    .ped-table th{padding:8px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--ar-dim);text-transform:uppercase;letter-spacing:0.05em;border-bottom:0.5px solid var(--ar-border);white-space:nowrap;cursor:pointer;user-select:none}
    .ped-table th:hover{color:var(--ar-white)}
    .ped-table th.r{text-align:right}
    .ped-table th.sorted{color:var(--ar-accent)}
    .ped-table td{padding:8px 10px;border-bottom:0.5px solid var(--ar-border);color:var(--ar-white);vertical-align:middle;white-space:nowrap}
    .ped-table tr:last-child td{border-bottom:none}
    .ped-table tr:hover td{background:var(--ar-faint)}
    .ped-table td.r{text-align:right;font-variant-numeric:tabular-nums}
    .ped-table td.cat{font-size:11px;color:var(--ar-dim)}
    .ped-table td.forn{font-size:12px;color:var(--ar-accent-dim);font-weight:500}
    .ped-table tr.sep-row td{background:var(--ar-black-3);font-size:11px;font-weight:500;color:var(--ar-dim);padding:4px 10px;text-transform:uppercase;letter-spacing:0.06em;border-bottom:0.5px solid var(--ar-border)}
    .ped-table tr.total-row td{background:var(--ar-black-3);font-size:12px;color:var(--ar-dim)}
    .cat-pill{font-size:12px;padding:4px 12px;border-radius:999px;border:0.5px solid var(--ar-border2);background:transparent;color:var(--ar-dim);cursor:pointer;font-family:inherit;transition:all 0.12s}
    .cat-pill.active{background:var(--ar-accent);color:var(--ar-ton);border-color:transparent;font-weight:500}
    .ibadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;cursor:pointer}
    .ib-ag{background:rgba(245,244,240,0.13);color:var(--ar-dim)}
    .ib-pr{background:rgba(239,159,39,0.18);color:var(--ar-accent-dim)}
    .ib-en{background:rgba(29,158,117,0.18);color:var(--ar-green)}
    .btn-xs{font-size:11px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--ar-border2);background:transparent;color:var(--ar-dim);cursor:pointer;font-family:inherit}
    .btn-xs:hover{background:var(--ar-faint2)}
    .btn-xs-acc{border-color:var(--ar-accent);color:var(--ar-accent)}
    .btn-xs-acc:hover{background:rgba(239,159,39,0.12)}
    @media(max-width:600px){
      body{padding:1rem 0.75rem}
      .stats{grid-template-columns:1fr 1fr}
      .tab{font-size:12px;padding:7px 3px}
      .grid2f,.grid3f{grid-template-columns:1fr}
      .rest-tabs{flex-wrap:wrap}
    }
  </style>
</head>

let restAtivo=null,ncCat='',ncSel={},pedSemId=null;
let sortKey='categoria',sortDir=1;

function toast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function fmtNum(n){
  if(!n&&n!==0)return'—';
  return'R$ '+Number(n).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?=,))/g,'.');
}
function fmt(n){
  if(!n&&n!==0)return'—';
  const parts=Number(n).toFixed(2).split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return'R$ '+parts[0]+','+parts[1];
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');btn.classList.add('active');
  if(id==='pedidos')renderPedidos();
  if(id==='dashboard')renderDashboard();
}

async function init(){await reloadAll();renderRestTabs();renderPedidos();}

async function reloadAll(){
  const [a,b,c,d,e,f]=await Promise.all([
    supa.from('restaurantes').select('*').order('nome'),
    supa.from('pedidos').select('*').order('created_at',{ascending:false}),
    supa.from('pedido_itens').select('*'),
    supa.from('produtos').select('*').order('nome'),
    supa.from('categorias').select('*').order('nome'),
    supa.from('semanas').select('*').order('data_inicio',{ascending:false})
  ]);
  C.restaurantes=a.data||[];C.pedidos=b.data||[];C.itens=c.data||[];
  C.produtos=d.data||[];C.categorias=e.data||[];C.semanas=f.data||[];
  if(!restAtivo&&C.restaurantes.length)restAtivo=C.restaurantes[0].id;
}

async function refreshDados(){
  await reloadAll();
  const pid=document.querySelector('.page.active')?.id?.replace('page-','');
  if(pid==='pedidos'){renderRestTabs();renderPedidos();}
  if(pid==='dashboard')renderDashboard();
  toast('Atualizado!');
}

function renderRestTabs(){
  document.getElementById('rest-tabs').innerHTML=C.restaurantes.map(r=>
    `<button class="rest-tab${r.id===restAtivo?' active':''}" onclick="setRest('${r.id}')">${r.nome}</button>`
  ).join('');
}
function setRest(id){restAtivo=id;renderRestTabs();renderPedidos();}

function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return day+'/'+m;}

// ── RENDER PRINCIPAL ─────────────────────────────────
function renderPedidos(){
  const el=document.getElementById('area-pedidos');
  const peds=C.pedidos.filter(p=>p.restaurante_id===restAtivo&&p.semana_id);
  const sems=C.semanas;
  const now=new Date();
  const gastoMes=peds.filter(p=>{const d=new Date(p.data);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).reduce((s,p)=>s+(p.total||0),0);
  const stats=`<div class="stats">
    <div class="stat"><div class="stat-l">Total de pedidos</div><div class="stat-v">${peds.length}</div></div>
    <div class="stat"><div class="stat-l">Aguardando</div><div class="stat-v" style="color:var(--ar-dim)">${peds.filter(p=>p.status==='Aguardando').length}</div></div>
    <div class="stat"><div class="stat-l">Em andamento</div><div class="stat-v" style="color:var(--ar-accent)">${peds.filter(p=>p.status==='Previsto').length}</div></div>
    <div class="stat"><div class="stat-l">Gasto no mês</div><div class="stat-v" style="font-size:16px">${fmtNum(gastoMes)}</div></div>
  </div>`;
  if(!sems.length&&!peds.length){
    el.innerHTML=stats+`<div class="empty"><i class="ti ti-calendar-week"></i>Nenhuma semana ainda.<br>Clique em "Nova semana" para começar.</div>`;return;
  }
  const semsHtml=sems.map(s=>renderSemanaCard(s,peds)).join('');
  el.innerHTML=stats+semsHtml;
}

function renderSemanaCard(s,allPeds){
  const peds=allPeds.filter(p=>p.semana_id===s.id);
  const totalSem=peds.reduce((a,p)=>a+(p.total||0),0);
  const entregues=peds.filter(p=>p.status==='Entregue').length;
  const pct=peds.length?Math.round(entregues/peds.length*100):0;
  const tabelaHtml=peds.length?renderTabelaItens(peds,false):'<div style="font-size:13px;color:var(--ar-dim);padding:8px 0">Nenhum pedido. Clique em "+ Pedido" para adicionar.</div>';
  return `<div class="semana-card" id="sem-${s.id}">
    <div class="semana-head" onclick="toggleSem('${s.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:500;color:var(--ar-white)">${s.nome}</div>
        <div style="font-size:12px;color:var(--ar-dim);margin-top:2px">${C.restaurantes.find(r=>r.id===restAtivo)?.nome||""} · ${fmtD(s.data_inicio)} a ${fmtD(s.data_fim)} · ${peds.length} pedido(s) · ${fmt(totalSem)} · ${pct}% entregue</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <button class="btn btn-sm" onclick="event.stopPropagation();openNovoPedido('${s.id}')"><i class="ti ti-plus"></i> Pedido</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();gerarEspelho('${s.id}')" title="Espelho para estoquista"><i class="ti ti-printer"></i> Espelho</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();editarSemana('${s.id}')"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-sm btn-del" onclick="event.stopPropagation();delSemana('${s.id}')"><i class="ti ti-trash"></i></button>
        <i class="ti ti-chevron-down" style="color:var(--ar-dim);font-size:14px" id="icsem-${s.id}"></i>
      </div>
    </div>
    <div class="semana-body">
      <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${tabelaHtml}
    </div>
  </div>`;
}

// ── TABELA DE ITENS ──────────────────────────────────
function renderTabelaItens(peds,showToolbar){
  // Montar lista flat de itens com info do pedido
  const rows=[];
  peds.forEach(p=>{
    const its=C.itens.filter(i=>i.pedido_id===p.id);
    its.forEach(it=>{
      rows.push({
        pedId:p.id,itemId:it.id,
        cat:it.categoria||'—',item:it.produto,med:it.unidade||'KG',
        valor:parseFloat(it.valor_unit)||0,qtd:parseFloat(it.quantidade)||0,
        forn:it.fornecedor||p.titulo||'—',
        status:it.status||'Aguardando'
      });
    });
  });
  if(!rows.length)return'<div style="font-size:13px;color:var(--ar-dim);padding:8px 0">Nenhum item cadastrado ainda.</div>';

  const sorted=[...rows].sort((a,b)=>{
    let va,vb;
    if(sortKey==='total'){va=a.valor*a.qtd;vb=b.valor*b.qtd;}
    else if(sortKey==='valor'){va=a.valor;vb=b.valor;}
    else if(sortKey==='qtd'){va=a.qtd;vb=b.qtd;}
    else{va=(a[{categoria:'cat',item:'item',fornecedor:'forn',status:'status'}[sortKey]]||'').toLowerCase();vb=(b[{categoria:'cat',item:'item',fornecedor:'forn',status:'status'}[sortKey]]||'').toLowerCase();}
    if(va<vb)return -sortDir;if(va>vb)return sortDir;return 0;
  });

  const showSep=sortKey==='fornecedor'||sortKey==='categoria';
  const sepKey=sortKey==='fornecedor'?'forn':'cat';
  let lastGroup='';
  let totalGeral=0;

  let rowsHtml='';
  sorted.forEach((r,i)=>{
    const sub=r.valor*r.qtd;totalGeral+=sub;
    if(showSep&&r[sepKey]!==lastGroup){lastGroup=r[sepKey];rowsHtml+=`<tr class="sep-row"><td colspan="8">${lastGroup}</td></tr>`;}
    const confirmar=r.status==='Aguardando'
      ?`<button class="btn-xs btn-xs-acc" onclick="confirmarItem('${r.itemId}','${r.pedId}')"><i class="ti ti-check"></i></button>`:'';
    const sbadge=`<span class="ibadge ${SC[r.status]||'ib-ag'}" onclick="cycleItem('${r.itemId}','${r.pedId}')" title="Clique para mudar">${r.status}</span>`;
    rowsHtml+=`<tr>
      <td class="cat">${r.cat}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.item}</td>
      <td style="color:var(--ar-dim)">${r.med}</td>
      <td class="r"><input type="number" min="0" step="0.01" value="${r.valor}" onchange="updItemValor('${r.itemId}','${r.pedId}',this.value)" style="width:80px;padding:3px 6px;font-size:12px;text-align:right;background:transparent;border:none;border-bottom:1px solid var(--ar-border2);color:var(--ar-white);font-family:inherit" onfocus="this.style.borderColor='var(--ar-accent)'" onblur="this.style.borderColor='var(--ar-border2)'"></td>
      <td class="r"><input type="number" min="0" step="0.5" value="${r.qtd||''}" onchange="updItemQtd('${r.itemId}','${r.pedId}',this.value)" style="width:60px;padding:3px 6px;font-size:12px;text-align:right;background:transparent;border:none;border-bottom:1px solid var(--ar-border2);color:var(--ar-white);font-family:inherit" onfocus="this.style.borderColor='var(--ar-accent)'" onblur="this.style.borderColor='var(--ar-border2)'"></td>
      <td class="forn" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${r.forn}</td>
      <td class="r" style="font-weight:500" id="sub-${r.itemId}">${sub>0?fmt(sub):'—'}</td>
      <td style="white-space:nowrap;display:flex;align-items:center;gap:4px">${sbadge} ${confirmar}<button class="btn-xs btn-del" onclick="delItem('${r.itemId}','${r.pedId}')" title="Excluir item" style="padding:2px 6px;color:var(--ar-red);border-color:transparent"><i class="ti ti-trash" style="font-size:12px"></i></button></td>
    </tr>`;
  });
  rowsHtml+=`<tr class="total-row"><td colspan="6" style="text-align:right;padding-right:10px">Total</td><td class="r" style="font-weight:500;color:var(--ar-white)">${fmt(totalGeral)}</td><td></td></tr>`;

  const thSort=(k,label)=>`<th class="${k===sortKey?'sorted':''} ${['valor','total','qtd'].includes(k)?'r':''}" onclick="doSort('${k}')">${label} <i class="ti ti-${sortDir===1&&sortKey===k?'sort-ascending':'sort-descending'}" style="font-size:10px;opacity:${sortKey===k?'1':'0.3'}"></i></th>`;

  const toolbar=showToolbar?`<div class="toolbar">
    <span style="font-size:12px;color:var(--ar-dim)">Ordenar:</span>
    ${['fornecedor','categoria','item','status','total'].map(k=>{
      const labels={fornecedor:'Fornecedor',categoria:'Categoria',item:'Item A-Z',status:'Status',total:'Total'};
      return `<button class="sort-btn${sortKey===k?' active':''}" onclick="doSort('${k}')">${labels[k]}</button>`;
    }).join('')}
  </div>`:'';

  return toolbar+`<div class="tbl-outer">
    <table class="ped-table">
      <colgroup>
        <col style="width:12%"><col style="width:24%"><col style="width:6%">
        <col style="width:12%"><col style="width:7%"><col style="width:14%">
        <col style="width:11%"><col style="width:14%">
      </colgroup>
      <thead><tr>
        ${thSort('categoria','Categoria')}
        ${thSort('item','Item')}
        <th>Med.</th>
        ${thSort('valor','Valor unit.')}
        ${thSort('qtd','Qtd.')}
        ${thSort('fornecedor','Fornecedor')}
        ${thSort('total','Total')}
        <th>Status</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}

function doSort(k){
  if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}
  renderPedidos();
}

function toggleSem(id){
  const el=document.getElementById('sem-'+id);
  const ic=document.getElementById('icsem-'+id);
  if(!el)return;
  el.classList.toggle('semana-collapsed');
  ic.className=el.classList.contains('semana-collapsed')?'ti ti-chevron-right':'ti ti-chevron-down';
  ic.style.cssText='color:var(--ar-dim);font-size:14px';
}

async function confirmarItem(itemId,pedId){
  await supa.from('pedido_itens').update({status:'Previsto'}).eq('id',itemId);
  C.itens=C.itens.map(i=>i.id===itemId?{...i,status:'Previsto'}:i);
  await recalcPedStatus(pedId);
  renderPedidos();toast('Confirmado!');
}

async function cycleItem(itemId,pedId){
  const item=C.itens.find(i=>i.id===itemId);if(!item)return;
  const novo=NS[item.status]||'Aguardando';
  await supa.from('pedido_itens').update({status:novo}).eq('id',itemId);
  C.itens=C.itens.map(i=>i.id===itemId?{...i,status:novo}:i);
  await recalcPedStatus(pedId);
  renderPedidos();
}



async function delItem(itemId, pedId){
  if(!confirm('Remover este item?'))return;
  await supa.from('pedido_itens').delete().eq('id',itemId);
  C.itens=C.itens.filter(i=>i.id!==itemId);
  await recalcTotal(pedId);
  toast('Item removido');
  renderPedidos();
}

async function updItemValor(itemId,pedId,val){
  const v=parseFloat(val)||0;
  await supa.from('pedido_itens').update({valor_unit:v}).eq('id',itemId);
  C.itens=C.itens.map(i=>i.id===itemId?{...i,valor_unit:v}:i);
  // Recalcular total do pedido
  await recalcTotal(pedId);
}

async function updItemQtd(itemId,pedId,val){
  const v=parseFloat(val)||null;
  await supa.from('pedido_itens').update({quantidade:v}).eq('id',itemId);
  C.itens=C.itens.map(i=>i.id===itemId?{...i,quantidade:v}:i);
  await recalcTotal(pedId);
}

async function recalcTotal(pedId){
  const its=C.itens.filter(i=>i.pedido_id===pedId);
  const total=its.reduce((s,i)=>s+(parseFloat(i.quantidade)||0)*(parseFloat(i.valor_unit)||0),0);
  await supa.from('pedidos').update({total}).eq('id',pedId);
  C.pedidos=C.pedidos.map(p=>p.id===pedId?{...p,total}:p);
}

async function recalcPedStatus(pedId){
  const its=C.itens.filter(i=>i.pedido_id===pedId);
  const todos=its.every(i=>i.status==='Entregue');
  const algum=its.some(i=>i.status!=='Aguardando');
  const novo=todos?'Entregue':algum?'Previsto':'Aguardando';
  await supa.from('pedidos').update({status:novo}).eq('id',pedId);
  C.pedidos=C.pedidos.map(p=>p.id===pedId?{...p,status:novo}:p);
}

// ── NOVA SEMANA ──────────────────────────────────────
function openNovaSemana(){
  const hoje=new Date();
  const dia=hoje.getDay()||7;
  const ini=new Date(hoje);ini.setDate(hoje.getDate()-dia+1);
  const fim=new Date(ini);fim.setDate(ini.getDate()+6);
  const fmt2=d=>d.toISOString().slice(0,10);
  const fn=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  showModal(`
    <div style="font-size:16px;font-weight:500;color:var(--ar-white);margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-calendar-week" style="color:var(--ar-accent);font-size:18px"></i> Nova semana
    </div>

    <div class="field"><label>Nome</label><input id="ns-n" type="text" value="${fn(ini)} a ${fn(fim)}" style="width:100%"></div>
    <div class="grid2f">
      <div class="field"><label>Início</label><input id="ns-i" type="date" value="${fmt2(ini)}"></div>
      <div class="field"><label>Fim</label><input id="ns-f" type="date" value="${fmt2(fim)}"></div>
    </div>
    <div class="g8" style="justify-content:flex-end;margin-top:4px">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" onclick="criarSemana()"><i class="ti ti-check"></i> Criar semana</button>
    </div>`);
}

function editarSemana(id){
  const sem=C.semanas.find(s=>s.id===id);
  if(!sem)return;
  showModal(`
    <div style="font-size:16px;font-weight:500;color:var(--ar-white);margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-pencil" style="color:var(--ar-accent);font-size:18px"></i> Renomear semana
    </div>
    <div class="field"><label>Nome</label><input id="es-nome" type="text" value="${sem.nome}" style="width:100%"></div>
    <div class="g8" style="justify-content:flex-end;margin-top:4px">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" onclick="salvarNomeSemana('${id}')"><i class="ti ti-check"></i> Salvar</button>
    </div>
  `);
}

async function salvarNomeSemana(id){
  const nome=document.getElementById('es-nome').value.trim();
  if(!nome){alert('Informe um nome.');return}
  await supa.from('semanas').update({nome}).eq('id',id);
  C.semanas=C.semanas.map(s=>s.id===id?{...s,nome}:s);
  toast('Semana renomeada!');closeModal();renderPedidos();
}

async function criarSemana(){
  const nome=document.getElementById('ns-n').value.trim();
  const ini=document.getElementById('ns-i').value;
  const fim=document.getElementById('ns-f').value;
  if(!nome){alert('Informe um nome.');return}
  await supa.from('semanas').insert({nome,data_inicio:ini,data_fim:fim});
  toast('Semana criada!');closeModal();await reloadAll();renderPedidos();
}
async function delSemana(id){
  if(!confirm('Remover semana? Os pedidos não serão removidos.'))return;
  await supa.from('semanas').delete().eq('id',id);
  C.semanas=C.semanas.filter(s=>s.id!==id);
  toast('Semana removida');renderPedidos();
}

// ── NOVO PEDIDO ──────────────────────────────────────
function openNovoPedidoGeral(){
  // Abre modal com seletor de restaurante e semana
  const restOpts=C.restaurantes.map(r=>`<option value="${r.id}"${r.id===restAtivo?' selected':''}>${r.nome}</option>`).join('');
  showModal(`
    <div style="font-size:16px;font-weight:500;color:var(--ar-white);margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-shopping-cart" style="color:var(--ar-accent);font-size:18px"></i> Novo pedido
    </div>
    <div class="grid2f" style="margin-bottom:12px">
      <div class="field"><label>Restaurante</label>
        <select id="np-rest" onchange="updateNpSemanas()" style="width:100%">${restOpts}</select>
      </div>
      <div class="field"><label>Semana</label>
        <select id="np-sem" style="width:100%"></select>
      </div>
    </div>
    <div class="g8" style="justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" onclick="irParaPedido()"><i class="ti ti-arrow-right"></i> Continuar</button>
    </div>
  `);
  updateNpSemanas();
}

function updateNpSemanas(){
  const restId=document.getElementById('np-rest')?.value;
  if(!restId)return;
  const sems=C.semanas;
  const sel=document.getElementById('np-sem');
  if(!sel)return;
  sel.innerHTML=sems.length
    ?sems.map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')
    +'<option value="">— Sem semana —</option>'
    :'<option value="">— Sem semana —</option>';
}

function irParaPedido(){
  const restId=document.getElementById('np-rest')?.value;
  const semId=document.getElementById('np-sem')?.value||null;
  closeModal();
  // Mudar restaurante ativo se necessário
  if(restId&&restId!==restAtivo){
    restAtivo=restId;
    renderRestTabs();
    renderPedidos();
  }
  openNovoPedido(semId||null);
}

function openNovoPedido(semId){
  pedSemId=semId||null;ncSel={};
  ncCat='Todos';
  const rest=C.restaurantes.find(r=>r.id===restAtivo);
  const sem=semId?C.semanas.find(s=>s.id===semId):null;
  // Categorias com "Todos" na frente
  const cats=[{nome:'Todos',cor:'var(--ar-accent)'},...C.categorias];
  const pills=cats.map(c=>`<button class="cat-pill${c.nome===ncCat?' active':''}" onclick="setNcCat('${c.nome}')" style="${c.nome===ncCat?'background:'+(c.cor||'var(--ar-accent)')+';color:#412402;border-color:transparent':''}">${c.nome}</button>`).join('');
  showModal(`
    <div style="font-size:16px;font-weight:500;color:var(--ar-white);margin-bottom:4px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-shopping-cart" style="color:var(--ar-accent);font-size:18px"></i> Novo pedido
    </div>
    <div style="font-size:12px;color:var(--ar-accent-dim);margin-bottom:16px">${rest?.nome||''}${sem?' · '+sem.nome:''}</div>
    <div class="grid2f" style="margin-bottom:12px">
      <div class="field"><label>Fornecedor / Título</label><input id="np-t" type="text" placeholder="Ex: Frigorifico Norte" style="width:100%"></div>
      <div class="field"><label>Data</label><input id="np-d" type="date" style="width:100%"></div>
    </div>
    <div class="field">
      <label>Categoria</label>
      <div id="np-pills" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${pills}</div>
      <label style="display:block;font-size:11px;font-weight:500;color:var(--ar-dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px">Buscar produto</label>
      <input id="np-s" type="text" placeholder="Digite para filtrar..." oninput="filtrarNp()" style="width:100%;margin-bottom:10px">
      <div class="prod-list" id="np-list"></div>
    </div>
    <div id="np-sel"></div>
    <div class="g8" style="justify-content:flex-end;margin-top:12px">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-acc" onclick="criarPedido()"><i class="ti ti-check"></i> Criar pedido</button>
    </div>`);
  document.getElementById('np-d').valueAsDate=new Date();
  filtrarNp();
}


function setNcCat(cat){
  ncCat=cat;
  const cor=cat==='Todos'?'var(--ar-accent)':(C.categorias.find(c=>c.nome===cat)?.cor||'var(--ar-accent)');
  document.querySelectorAll('.cat-pill').forEach(p=>{
    const a=p.textContent.trim()===cat;
    p.classList.toggle('active',a);
    p.style.background=a?cor:'';p.style.color=a?'#412402':'';
    p.style.borderColor=a?'transparent':'';p.style.fontWeight=a?'500':'';
  });
  filtrarNp();
}
function filtrarNp(){
  const q=(document.getElementById('np-s')?.value||'').toLowerCase();
  const lista=C.produtos.filter(p=>(ncCat==='Todos'||p.categoria===ncCat)&&p.nome.toLowerCase().includes(q));
  document.getElementById('np-list').innerHTML=lista.length
    ?lista.map(p=>`<div class="prod-row">
        <input type="checkbox" value="${p.id}" ${ncSel[p.id]?'checked':''} onchange="toggleProd('${p.id}','${p.nome.replace(/'/g,'\\x27')}','${p.unidade}')">
        <span style="flex:1">${p.nome}</span>
        <span style="font-size:11px;color:var(--ar-dim)">${p.unidade}</span>
      </div>`).join('')
    :`<div style="font-size:13px;color:var(--ar-dim);padding:12px 0;text-align:center">Nenhum produto nesta categoria</div>`;
}
function toggleProd(id,nome,un){
  if(ncSel[id])delete ncSel[id];
  else ncSel[id]={nome,unidade:un,qty:'',valor:'',categoria:ncCat};
  renderNpSel();
}
function renderNpSel(){
  const ids=Object.keys(ncSel);
  const el=document.getElementById('np-sel');
  if(!ids.length){el.innerHTML='';return}
  el.innerHTML=`<div class="sep"></div>
    <div class="slbl">Itens selecionados (${ids.length})</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Produto</th><th>Qtd</th><th>Valor unit. (R$)</th><th></th></tr></thead>
      <tbody>${ids.map(id=>{const p=ncSel[id];return`<tr>
        <td style="font-size:12px">${p.nome} <span style="color:var(--ar-dim)">${p.unidade}</span></td>
        <td><input type="number" min="0" step="0.5" value="${p.qty}" onchange="updP('${id}','qty',this.value)" style="width:70px;padding:4px 8px;font-size:12px"></td>
        <td><input type="number" min="0" step="0.01" value="${p.valor}" onchange="updP('${id}','valor',this.value)" style="width:90px;padding:4px 8px;font-size:12px" placeholder="0.00"></td>
        <td><span style="cursor:pointer;color:var(--ar-red)" onclick="remP('${id}')">&#x2715;</span></td>
      </tr>`}).join('')}</tbody>
    </table></div>`;
}
function updP(id,f,v){if(ncSel[id])ncSel[id][f]=v}
function remP(id){
  delete ncSel[id];renderNpSel();
  const cb=document.querySelector('#np-list input[value="'+id+'"]');if(cb)cb.checked=false;
}
async function criarPedido(){
  const titulo=document.getElementById('np-t').value.trim()||'Pedido sem título';
  const data=document.getElementById('np-d').value||new Date().toISOString().slice(0,10);
  const ids=Object.keys(ncSel);
  if(!ids.length){alert('Selecione ao menos um produto.');return}
  const total=ids.reduce((s,id)=>{const p=ncSel[id];return s+(parseFloat(p.qty)||0)*(parseFloat(p.valor)||0)},0);
  const {data:ped,error}=await supa.from('pedidos').insert({
    restaurante_id:restAtivo,semana_id:pedSemId,titulo,data,status:'Aguardando',total
  }).select().single();
  if(error){toast('Erro ao criar pedido');return}
  await supa.from('pedido_itens').insert(ids.map(id=>{
    const p=ncSel[id];
    return{pedido_id:ped.id,produto:p.nome,categoria:p.categoria,unidade:p.unidade,
      quantidade:parseFloat(p.qty)||null,valor_unit:parseFloat(p.valor)||null,
      fornecedor:titulo,status:'Aguardando'};
  }));
  toast('Pedido criado!');closeModal();await reloadAll();renderPedidos();
}
async function delPedido(id){
  if(!confirm('Remover este pedido?'))return;
  await supa.from('pedidos').delete().eq('id',id);
  C.pedidos=C.pedidos.filter(p=>p.id!==id);
  C.itens=C.itens.filter(i=>i.pedido_id!==id);
  toast('Pedido removido');renderPedidos();
}

function fmtNum(n){
  if(!n&&n!==0)return'—';
  const parts=Number(n).toFixed(2).split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return'R$ '+parts[0]+','+parts[1];
}

function gerarPDF(pedId){
  const{html}=buildHTML(pedId);
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),600);
}
function gerarImagem(pedId){
  const{html,ped}=buildHTML(pedId);
  toast('Gerando imagem...');
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:800px;height:1px;border:none;visibility:hidden';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();iframe.contentDocument.write(html);iframe.contentDocument.close();
  setTimeout(()=>{
    const h=iframe.contentDocument.body.scrollHeight+80;iframe.style.height=h+'px';
    setTimeout(()=>{
      html2canvas(iframe.contentDocument.documentElement,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:800,windowWidth:800})
        .then(canvas=>{
          const link=document.createElement('a');
          link.download='pedido-'+ped.titulo.replace(/[^a-zA-Z0-9]/g,'-')+'.jpg';
          link.href=canvas.toDataURL('image/jpeg',0.95);link.click();
          document.body.removeChild(iframe);toast('Imagem baixada!');
        }).catch(()=>{document.body.removeChild(iframe);toast('Erro ao gerar imagem');});
    },500);
  },500);
}

// ── DASHBOARD ────────────────────────────────────────
function renderDashboard(){
  const el=document.getElementById('area-dashboard');
  const now=new Date(),mes=now.getMonth(),ano=now.getFullYear();
  const tMes=C.pedidos.filter(p=>{const d=new Date(p.data);return d.getMonth()===mes&&d.getFullYear()===ano}).reduce((s,p)=>s+(p.total||0),0);
  const tG=C.pedidos.reduce((s,p)=>s+(p.total||0),0);
  const stats=`<div class="stats" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat"><div class="stat-l">Gasto no mês</div><div class="stat-v" style="font-size:16px">${fmtNum(tMes)}</div></div>
    <div class="stat"><div class="stat-l">Total acumulado</div><div class="stat-v" style="font-size:16px">${fmtNum(tG)}</div></div>
    <div class="stat"><div class="stat-l">Pedidos abertos</div><div class="stat-v" style="color:var(--ar-accent)">${C.pedidos.filter(p=>p.status!=='Entregue').length}</div></div>
    <div class="stat"><div class="stat-l">Pedidos entregues</div><div class="stat-v" style="color:var(--ar-green)">${C.pedidos.filter(p=>p.status==='Entregue').length}</div></div>
  </div>`;
  const rests=C.restaurantes.map(r=>{
    const peds=C.pedidos.filter(p=>p.restaurante_id===r.id);
    const tR=peds.reduce((s,p)=>s+(p.total||0),0);
    const tMR=peds.filter(p=>{const d=new Date(p.data);return d.getMonth()===mes&&d.getFullYear()===ano}).reduce((s,p)=>s+(p.total||0),0);
    const entR=peds.filter(p=>p.status==='Entregue').length;
    const pct=peds.length?Math.round(entR/peds.length*100):0;
    const badges=SL.map(s=>{const n=peds.filter(p=>p.status===s).length;return n?`<span class="badge ${SC[s]||'s-aguardando'}" style="font-size:11px;padding:3px 9px">${s}: ${n}</span>`:''}).join('');
    return`<div class="rest-summary">
      <div class="rest-summary-title"><span style="width:10px;height:10px;border-radius:50%;background:var(--ar-accent);display:inline-block"></span>
        ${r.nome}<span style="font-size:12px;color:var(--ar-dim);font-weight:400;margin-left:6px">${peds.length} pedido(s)</span></div>
      <div class="grid3f" style="margin-bottom:12px">
        <div class="stat"><div class="stat-l">Gasto no mês</div><div class="stat-v" style="font-size:15px">${fmtNum(tMR)}</div></div>
        <div class="stat"><div class="stat-l">Total acumulado</div><div class="stat-v" style="font-size:15px">${fmtNum(tR)}</div></div>
        <div class="stat"><div class="stat-l">Entregues</div><div class="stat-v">${entR}/${peds.length}</div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${badges}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--ar-dim);margin-top:4px">${pct}% concluído</div>
    </div>`;
  }).join('');
  el.innerHTML=stats+rests;
}

      <select id="eg-semana" style="width:100%">

function confirmarEspelhoGeral(){
  const statusSel=[...document.querySelectorAll('#mbox input[type=checkbox]:checked')].filter(cb=>!cb.classList.contains('rest-filter')).map(cb=>cb.value);
  const restSel=[...document.querySelectorAll('#mbox input.rest-filter:checked')].map(cb=>cb.value);
  const semSel=document.getElementById('eg-semana')?.value||'';
  closeModal();
  _gerarEspelhoGeral(statusSel, restSel, semSel);
}

function _gerarEspelhoGeral(statusFiltro, restFiltro, semFiltro){
  const allPeds=C.pedidos.filter(function(p){return restFiltro.includes(p.restaurante_id)&&(!semFiltro||p.semana_id===semFiltro);});
  if(!allPeds.length){toast('Nenhum pedido encontrado');return;}

  const rows=[];
  allPeds.forEach(function(p){
    const rest=C.restaurantes.find(function(r){return r.id===p.restaurante_id;});
    const sem=C.semanas.find(function(s){return s.id===p.semana_id;});
    C.itens.filter(function(i){return i.pedido_id===p.id&&statusFiltro.includes(i.status||'Aguardando');}).forEach(function(it){
      rows.push({
        restNome:rest?rest.nome:'—',
        semNome:sem?sem.nome:'—',
        forn:it.fornecedor||p.titulo||'—',
        cat:it.categoria||'—',
        item:it.produto,
        med:it.unidade||'KG',
        valor:parseFloat(it.valor_unit)||0,
        qty:parseFloat(it.quantidade)||0,
        status:it.status||'Aguardando'

  });

  if(!rows.length){toast('Nenhum item com os filtros selecionados');return;}

  rows.sort(function(a,b){return a.forn.localeCompare(b.forn)||a.restNome.localeCompare(b.restNome)||a.cat.localeCompare(b.cat)||a.item.localeCompare(b.item);});

  var totalGeral=rows.reduce(function(s,r){return s+r.valor*r.qty;},0);
